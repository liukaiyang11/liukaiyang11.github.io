      <h1>国内使用 Docker 网络限制解决方法</h1>
      <p class="meta">分类：开发环境与工程实践</p>
      <p>本文总结了在 WSL 环境中使用 Docker 时的网络访问问题，给出三种实用方案：</p>
      <ol>
        <li>配置国内镜像加速器（阿里云/腾讯云等）。</li>
        <li>使用 Windows 侧代理（如 Clash）并在 WSL 中设置环境变量。</li>
        <li>通过 alias 实现代理开关，便于按需启用/关闭。</li>
      </ol>
